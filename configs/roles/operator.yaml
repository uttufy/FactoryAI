# Operator Role Configuration
role: operator
name: "Operator"
description: "AI agent working at a station"

# Permissions
permissions:
  - execute_work
  - send_heartbeat
  - request_help
  - report_status

# Limitations
limitations:
  - cannot_dispatch_work
  - cannot_modify_job_status
  - cannot_override_planner

# Settings
settings:
  heartbeat_interval: 30  # seconds
  max_execution_time: 3600  # 1 hour
  stuck_detection_time: 300  # 5 minutes without heartbeat

# Skills (optional specializations)
skills:
  - general
  - coding
  - testing
  - documentation

# Claude-specific settings
claude:
  model: "claude-opus-4-6"
  max_tokens: 200000
  temperature: 0.7
