# Floor Supervisor Role Configuration
role: supervisor
name: "Floor Supervisor"
description: "Monitors floor, coordinates handoffs, oversees stations"

# Permissions
permissions:
  - coordinate_handoffs
  - monitor_stations
  - monitor_operators
  - verify_health
  - escalate_issues
  - request_nudges

# Limitations
limitations:
  - cannot_dispatch_work  # Only Planner can dispatch
  - cannot_modify_plans
  - cannot_execute_work

# Settings
settings:
  health_check_interval: 60  # seconds
  stuck_detection_timeout: 300  # 5 minutes
  max_consecutive_failures: 3

# Handoff configuration
handoff:
  enabled: true
  preserve_context: true
  timeout: 300  # 5 minutes

# Monitoring thresholds
thresholds:
  max_station_idle_time: 1800  # 30 minutes
  max_operator_stuck_time: 600  # 10 minutes
  max_queue_length: 100
