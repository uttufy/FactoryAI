# Factory Configuration
factory:
  name: "Main Factory"
  description: "Primary FactoryAI instance"

  # Station limits
  max_stations: 10
  max_operators: 20

  # Default timeouts
  default_timeout: 3600  # 1 hour
  heartbeat_interval: 30  # seconds

  # Worktree configuration
  worktree_dir: ".factory"
  cleanup_on_exit: true

# Event Bus configuration
event_bus:
  buffer_size: 1000
  log_events: true
  dead_letter_enabled: true

# Database configuration
database:
  path: "./factory.db"
  connection_pool: 5

# Beads configuration
beads:
  binary_path: ""  # Empty means use PATH
  working_dir: "."  # Current directory
  rig_path: "."     # Beads rig (repository) path

# tmux configuration
tmux:
  session_prefix: "factory-"
  base_window_name: "factory"

# Claude configuration
claude:
  binary_path: ""  # Empty means use PATH or CLAUDE_BIN env var
  model: "claude-opus-4-6"  # Default model

# Inspector configuration
inspector:
  default_max_retries: 2
  default_criteria: "Output must be accurate, complete, and well-formatted"

# Support service configuration
support:
  health_check_interval: 300  # seconds (5 minutes)
  cleanup_interval: 3600      # seconds (1 hour)
  lease_recovery_interval: 30 # seconds
  stuck_timeout: 300          # seconds (5 minutes)

# Merge configuration
merge:
  strategy: "parallel"  # parallel or sequential
  max_parallel: 3
  auto_resolve: false

# Logging configuration
logging:
  level: "info"  # debug, info, warn, error
  format: "text"  # text or json
