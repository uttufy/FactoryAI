name = "Release Formula"
description = "Complete release workflow from feature to production"

[variables]
version = "{version_number}"
release_branch = "release/{version}"

[[steps]]
name = "pre-check"
description = "Pre-release checks and validation"
assignee = "release-manager"
dependencies = []
acceptance = "All tests must pass, documentation updated, changelog written"

[[steps]]
name = "branch"
description = "Create release branch"
assignee = "release-manager"
dependencies = ["pre-check"]
acceptance = "Branch must be created from main with correct version number"

[[steps]]
name = "build"
description = "Build release artifacts"
assignee = "build-engineer"
dependencies = ["branch"]
acceptance = "All build artifacts must be generated and signed"

[[steps]]
name = "deploy-staging"
description = "Deploy to staging environment"
assignee = "deployment-engineer"
dependencies = ["build"]
acceptance = "Staging deployment must be successful and smoke tests must pass"

[[steps]]
name = "qa-verification"
description = "QA verification on staging"
assignee = "qa-team"
dependencies = ["deploy-staging"]
acceptance = "All QA test cases must pass with no critical bugs"

[[steps]]
name = "deploy-production"
description = "Deploy to production"
assignee = "deployment-engineer"
dependencies = ["qa-verification"]
acceptance = "Production deployment must be successful with zero downtime"

[[steps]]
name = "post-release"
description = "Post-release verification and monitoring"
assignee = "sre-team"
dependencies = ["deploy-production"]
acceptance = "Production monitoring must show normal operation for 30 minutes"

[[steps]]
name = "tag-release"
description = "Tag and announce release"
assignee = "release-manager"
dependencies = ["post-release"]
acceptance = "Git tag created, release notes published, announcement sent"
