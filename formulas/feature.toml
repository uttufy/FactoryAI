name = "Feature Implementation Formula"
description = "Implements a new feature from start to finish"

[variables]
default_branch = "main"
feature_branch = "{feature_name}"

[[steps]]
name = "design"
description = "Design the feature architecture"
assignee = "architect"
dependencies = []
acceptance = "Design document must include: architecture diagram, API definitions, data models, and testing strategy"

[[steps]]
name = "implement"
description = "Implement the feature"
assignee = "developer"
dependencies = ["design"]
acceptance = "Code must compile, pass all tests, and follow project conventions"

[[steps]]
name = "review"
description = "Code review of the implementation"
assignee = "reviewer"
dependencies = ["implement"]
acceptance = "Code must be reviewed and approved by at least one team member"

[[steps]]
name = "test"
description = "Integration and QA testing"
assignee = "tester"
dependencies = ["review"]
acceptance = "All tests must pass, including integration tests and manual QA"

[[steps]]
name = "merge"
description = "Merge to main branch"
assignee = "integrator"
dependencies = ["test"]
acceptance = "Merge must be conflict-free and pass CI/CD pipeline"
