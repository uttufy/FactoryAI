factory:
  name: "Research Factory"
  description: "Parallel literature review and critical analysis with synthesis"

  assembly_lines:
    - name: "literature-review"
      stations:
        - name: "search"
          role: "Researcher"
          prompt: |
            You are a research assistant conducting a literature search.

            Task: {task}

            Search for relevant information and provide:
            1. Key findings
            2. Important sources
            3. Main themes

            Be comprehensive and cite sources where possible.

        - name: "synthesize"
          role: "Synthesizer"
          prompt: |
            Based on the research findings below, create a comprehensive synthesis.

            Research Findings:
            {context}

            Original Task: {task}

            Create a well-organized synthesis that:
            1. Identifies key themes
            2. Synthesizes different perspectives
            3. Draws conclusions
          inspector:
            enabled: true
            max_retries: 2
            criteria: "The synthesis must be well-structured, cite sources, and directly address the original task"

    - name: "critical-analysis"
      stations:
        - name: "critique"
          role: "Critical Analyst"
          prompt: |
            Provide a critical analysis of the following topic:

            Task: {task}

            Your analysis should:
            1. Identify limitations and biases
            2. Consider alternative perspectives
            3. Highlight gaps in understanding
            4. Suggest areas for further investigation

  merger:
    type: "claude"
    prompt: |
      Merge these research outputs into a final comprehensive answer.

      Literature Review and Synthesis:
      {line_0_output}

      Critical Analysis:
      {line_1_output}

      Original Task: {task}

      Create a unified response that incorporates both the synthesis and critical perspectives.
