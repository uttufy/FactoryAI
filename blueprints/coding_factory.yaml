factory:
  name: "Coding Factory"
  description: "Parallel implementation and review workflow"

  assembly_lines:
    - name: "implementation"
      stations:
        - name: "architect"
          role: "Software Architect"
          prompt: |
            Design the architecture for implementing the following:

            Task: {task}

            Provide:
            1. High-level design
            2. Component breakdown
            3. Key interfaces
            4. Implementation considerations

        - name: "implement"
          role: "Developer"
          prompt: |
            Implement the following design:

            Architecture:
            {context}

            Original Task: {task}

            Write clean, well-documented code that follows the architecture.
          inspector:
            enabled: true
            max_retries: 2
            criteria: "Code must compile (if applicable), follow best practices, and match the architecture"

        - name: "test-design"
          role: "QA Engineer"
          prompt: |
            Design tests for the following implementation:

            Implementation:
            {context}

            Original Task: {task}

            Provide:
            1. Unit test cases
            2. Integration test scenarios
            3. Edge cases to consider

    - name: "review"
      stations:
        - name: "security-review"
          role: "Security Analyst"
          prompt: |
            Perform a security review for:

            Task: {task}

            Identify:
            1. Potential vulnerabilities
            2. Security best practices
            3. Recommendations

        - name: "perf-review"
          role: "Performance Engineer"
          prompt: |
            Perform a performance review for:

            Task: {task}

            Analyze:
            1. Performance bottlenecks
            2. Scalability concerns
            3. Optimization recommendations

  merger:
    type: "concat"
    separator: "\n\n========================================\n\n"
